<!DOCTYPE html>
<html>
<head>
  <title>Student Results</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 15px;
      text-align: center;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      max-width: 420px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      font-size: 20px;
      margin-bottom: 5px;
    }

    h3 {
      margin-bottom: 15px;
    }

    p {
      text-align: left;
      margin: 6px 0;
      font-size: 15px;
    }

    hr {
      margin: 15px 0;
    }

    .btn {
      background: orange;
      padding: 15px;
      border: none;
      width: 100%;
      margin-top: 20px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 6px;
    }

    .btn:active {
      opacity: 0.7;
    }
  </style>
</head>

<body>

<div class="card">

  <h2>NICHTECH TECHNOLOGIES</h2>
  <h2>TRAINING COLLEGE</h2>
  <h3>Student Result Slip</h3>

  <p><strong>Name:</strong> <span id="name"></span></p>
  <p><strong>Student ID:</strong> <span id="id"></span></p>
  <p><strong>Program:</strong> <span id="program"></span></p>
  <p><strong>Intake:</strong> <span id="intake"></span></p>
  <p><strong>Year:</strong> <span id="year"></span></p>
  <p><strong>Duration:</strong> <span id="duration"></span></p>
  <p><strong>Sponsor:</strong> <span id="sponsor"></span></p>
  <p><strong>Balance:</strong> <span id="balance"></span></p>

  <hr>

  <p><strong>Results:</strong> <span id="results"></span></p>

  <!-- ✅ WORKING DOWNLOAD BUTTON -->
  <button class="btn" onclick="downloadFile()">
    Download Results
  </button>

</div>

<script>

// LOAD DATA
var data = JSON.parse(localStorage.getItem("studentData"));

if (!data) {
  alert("Session expired. Please login again.");
  window.location.href = "portal.html";
} else {
  document.getElementById("name").innerText = data.name || "";
  document.getElementById("id").innerText = data.studentId || "";
  document.getElementById("program").innerText = data.program || "";
  document.getElementById("intake").innerText = data.intake || "";
  document.getElementById("year").innerText = data.year || "";
  document.getElementById("duration").innerText = data.duration || "";
  document.getElementById("sponsor").innerText = data.sponsor || "";
  document.getElementById("balance").innerText = data.balance || "";
  document.getElementById("results").innerText = data.results || "";
}

// ✅ GUARANTEED DOWNLOAD FUNCTION
function downloadFile() {

  const data = JSON.parse(localStorage.getItem("studentData"));

  if (!data) {
    alert("No data found");
    return;
  }

  const content = `
NICHTECH TECHNOLOGIES TRAINING COLLEGE
--------------------------------------

Student Result Slip

Name: ${data.name}
Student ID: ${data.studentId}
Program: ${data.program}
Intake: ${data.intake}
Year: ${data.year}
Duration: ${data.duration}
Sponsor: ${data.sponsor}
Balance: ${data.balance}

--------------------------------------

Results:
${data.results}

--------------------------------------
Generated by Nichtech Portal
`;

  // CREATE FILE
  const blob = new Blob([content], { type: "text/plain" });
  const link = document.createElement("a");

  link.href = URL.createObjectURL(blob);
  link.download = data.studentId + "_results.txt";

  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

</script>

</body>
</html>
