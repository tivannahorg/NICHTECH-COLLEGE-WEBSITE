<!DOCTYPE html>
<html>
<head>
  <title>Student Dashboard</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#f2f5f9;
      color:#222;
    }

    /* TOP BAR */

    .topbar{
      background:#0b5e2b;
      color:white;
      padding:18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      box-shadow:0 2px 8px rgba(0,0,0,0.1);
    }

    .topbar h2{
      font-size:24px;
    }

    .menu-icon{
      font-size:28px;
      cursor:pointer;
    }

    /* MENU */

    .menu{
      display:none;
      background:white;
      box-shadow:0 3px 10px rgba(0,0,0,0.1);
    }

    .menu a{
      display:block;
      padding:15px 20px;
      text-decoration:none;
      color:#333;
      border-bottom:1px solid #eee;
      font-size:17px;
    }

    .menu a:hover{
      background:#f4f4f4;
    }

    .show{
      display:block;
    }

    /* MAIN CARD */

    .dashboard-container{
      padding:20px;
    }

    .dashboard-card{
      background:white;
      border-radius:18px;
      overflow:hidden;
      box-shadow:0 4px 15px rgba(0,0,0,0.08);
    }

    /* HEADER */

    .card-header{
      background:#0b5e2b;
      color:white;
      text-align:center;
      padding:30px 20px;
    }

    .logo{
      width:90px;
      height:90px;
      object-fit:cover;
      border-radius:50%;
      background:white;
      padding:5px;
      margin-bottom:15px;
    }

    .college-name{
      font-size:26px;
      font-weight:bold;
      line-height:1.4;
    }

    .portal-title{
      margin-top:10px;
      font-size:18px;
      opacity:0.9;
    }

    /* STUDENT INFO */

    .student-section{
      padding:25px 20px;
    }

    .welcome{
      text-align:center;
      font-size:30px;
      font-weight:bold;
      color:#111;
      margin-bottom:25px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:10px;
    }

    table tr:nth-child(even){
      background:#f8f8f8;
    }

    table td{
      padding:16px;
      border-bottom:1px solid #ddd;
      font-size:17px;
    }

    .label{
      font-weight:bold;
      color:#0b5e2b;
      width:40%;
    }

    /* RESULTS */

    .results-box{
      margin-top:30px;
      background:#f8fafc;
      border-left:5px solid #0b5e2b;
      padding:20px;
      border-radius:10px;
    }

    .results-box h3{
      color:#0b5e2b;
      margin-bottom:15px;
      font-size:24px;
    }

    .results-text{
      font-size:18px;
      line-height:1.6;
      color:#333;
    }

    /* BUTTON */

    .btn-area{
      padding:20px;
      text-align:center;
    }

    .logout-btn{
      background:#d62828;
      color:white;
      border:none;
      padding:15px 30px;
      border-radius:10px;
      font-size:18px;
      cursor:pointer;
      width:100%;
    }

    .logout-btn:hover{
      background:#b71c1c;
    }

    /* FOOTER */

    .footer{
      text-align:center;
      padding:20px;
      font-size:14px;
      color:#777;
    }

  </style>
</head>

<body>

<!-- TOP BAR -->

<header class="topbar">

  <div class="menu-icon" onclick="toggleMenu()">☰</div>

  <h2>Student Dashboard</h2>

</header>

<!-- MENU -->

<nav id="menu" class="menu">

  <a href="index.html">Home</a>

  <a href="portal.html">Student Portal</a>

  <a href="contact.html">Contact</a>

</nav>

<!-- DASHBOARD -->

<div class="dashboard-container">

  <div class="dashboard-card">

    <!-- HEADER -->

    <div class="card-header">

      <!-- REPLACE logo.png WITH YOUR LOGO -->

      <img src="images/logo.png" class="logo">

      <div class="college-name">
        NICHTECH TECHNOLOGIES<br>
        TRAINING COLLEGE
      </div>

      <div class="portal-title">
        Official Student Portal
      </div>

    </div>

    <!-- STUDENT INFO -->

    <div class="student-section">

      <div class="welcome" id="welcomeName">
        Welcome Student
      </div>

      <table>

        <tr>
          <td class="label">Student Number</td>
          <td id="studentId"></td>
        </tr>

        <tr>
          <td class="label">Program</td>
          <td id="program"></td>
        </tr>

        <tr>
          <td class="label">Intake</td>
          <td id="intake"></td>
        </tr>

        <tr>
          <td class="label">Academic Year</td>
          <td id="year"></td>
        </tr>

        <tr>
          <td class="label">Duration</td>
          <td id="duration"></td>
        </tr>

        <tr>
          <td class="label">Sponsor</td>
          <td id="sponsor"></td>
        </tr>

        <tr>
          <td class="label">Outstanding Balance</td>
          <td id="balance"></td>
        </tr>

      </table>

      <!-- RESULTS -->

      <div class="results-box">

        <h3>Results</h3>

        <div class="results-text" id="results">
          Results not available
        </div>

      </div>

    </div>

    <!-- BUTTON -->

    <div class="btn-area">

      <button class="logout-btn" onclick="logout()">
        Logout
      </button>

    </div>

  </div>

</div>

<!-- FOOTER -->

<div class="footer">
  © 2026 Nichtech Technologies Training College
</div>

<!-- SCRIPT -->

<script>

function toggleMenu() {

  document.getElementById("menu").classList.toggle("show");

}

// LOAD STUDENT DATA

const data = JSON.parse(localStorage.getItem("studentData"));

if(!data){

  window.location.href = "portal.html";

}
else{

  document.getElementById("welcomeName").innerText =
    "Welcome " + (data.name || "Student");

  document.getElementById("studentId").innerText =
    data.studentId || "";

  document.getElementById("program").innerText =
    data.program || "";

  document.getElementById("intake").innerText =
    data.intake || "";

  document.getElementById("year").innerText =
    data.year || "";

  document.getElementById("duration").innerText =
    data.duration || "";

  document.getElementById("sponsor").innerText =
    data.sponsor || "";

  document.getElementById("balance").innerText =
    data.balance || "";

  document.getElementById("results").innerText =
    data.results || "Results not released";

}

// LOGOUT

function logout(){

  localStorage.clear();

  window.location.href = "portal.html";

}

</script>

</body>
</html>
